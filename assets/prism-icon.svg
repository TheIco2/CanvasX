<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="prismGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="prismGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c44569;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="prismGradient3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00cc44;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" fill="#0a0e27"/>
  
  <!-- Main Prism Shape - 3D triangular prism -->
  <!-- Front face (blue) -->
  <polygon points="256,80 140,320 372,320" fill="url(#prismGradient1)" filter="url(#glow)"/>
  
  <!-- Left face (red/pink) -->
  <polygon points="140,320 80,380 180,460" fill="url(#prismGradient2)" filter="url(#glow)"/>
  
  <!-- Right face (green) -->
  <polygon points="372,320 432,380 332,460" fill="url(#prismGradient3)" filter="url(#glow)"/>
  
  <!-- Bottom connecting faces for 3D effect -->
  <polygon points="140,320 180,460 372,320 332,460" fill="#00a8cc" opacity="0.6"/>
  
  <!-- Light rays coming through prism -->
  <line x1="256" y1="30" x2="256" y2="80" stroke="#00ffff" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="220" y1="40" x2="200" y2="90" stroke="#00ffff" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  <line x1="292" y1="40" x2="312" y2="90" stroke="#00ffff" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  
  <!-- Refracted light rays -->
  <line x1="140" y1="330" x2="80" y2="420" stroke="#ff6b9d" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="372" y1="330" x2="432" y2="420" stroke="#00ff88" stroke-width="3" opacity="0.7" stroke-linecap="round"/>
  <line x1="256" y1="330" x2="256" y2="420" stroke="#ffff00" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Highlight/shine on prism -->
  <ellipse cx="220" cy="180" rx="30" ry="50" fill="white" opacity="0.2"/>
  
  <!-- Text: PRISM -->
  <text x="256" y="490" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#00ffff" opacity="0.9">PRISM</text>
</svg>
